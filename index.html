<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tu Cumple EP ❤️</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #121212;
  color: white;
  overflow-x: hidden;
}

/* NAV BAR */
.nav {
  position: absolute;
  top: 15px;
  left: 20px;
  display: flex;
  align-items: center;
  gap: 8px;
  font-weight: bold;
}

.logo {
  width: 22px;
  height: 22px;
  background: #1db954;
  border-radius: 50%;
  position: relative;
}

.logo::before,
.logo::after {
  content: '';
  position: absolute;
  left: 4px;
  right: 4px;
  height: 2px;
  background: #121212;
  border-radius: 2px;
}

.logo::before {
  top: 7px;
}

.logo::after {
  top: 12px;
}

.brand {
  font-size: 14px;
}

/* FONDO */
.bg {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: url('cover.jpg') center/cover no-repeat;
  filter: blur(60px) brightness(0.4);
  z-index: -1;
}

/* HEADER */
.header {
  display: flex;
  align-items: flex-end;
  gap: 20px;
  padding: 60px 20px 30px; /* más espacio arriba por logo */
  background: linear-gradient(to bottom, rgba(29,185,84,0.9), #121212);
}

.cover {
  width: 200px;
  border-radius: 10px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.6);
}

/* VINILO */
.vinyl {
  position: absolute;
  width: 200px;
  height: 200px;
  border-radius: 50%;
  background: radial-gradient(circle, #111 40%, #000 70%);
  z-index: -1;
  left: 20px;
  top: 60px;
  transform: scale(0.9);
  opacity: 0;
}

.vinyl.playing {
  animation: spin 3s linear infinite;
  opacity: 1;
}

@keyframes spin {
  from { transform: rotate(0deg) scale(0.9); }
  to { transform: rotate(360deg) scale(0.9); }
}

/* INFO */
.info {
  text-align: left;
}

.label {
  font-size: 12px;
  color: #ddd;
}

.title {
  font-size: 42px;
  font-weight: bold;
  margin: 5px 0;
}

.artist {
  color: #b3b3b3;
}

/* LISTA */
.container {
  padding: 20px;
}

.song {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px;
  border-radius: 8px;
  margin-bottom: 10px;
}

.song:hover {
  background: rgba(255,255,255,0.05);
}

button {
  background: #1db954;
  border: none;
  border-radius: 50%;
  width: 45px;
  height: 45px;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

/* PROGRESO */
.progress {
  height: 4px;
  background: #333;
  margin-top: 5px;
  border-radius: 5px;
  overflow: hidden;
}

.progress-bar {
  height: 100%;
  width: 0%;
  background: #1db954;
}

/* FOOTER */
.footer {
  text-align: center;
  color: #aaa;
  font-size: 13px;
  padding: 30px 10px;
}

/* RESPONSIVE */
@media (max-width: 600px) {
  .header {
    flex-direction: column;
    align-items: center;
    text-align: center;
  }

  .cover {
    width: 180px;
  }

  .title {
    font-size: 28px;
  }

  .vinyl {
    display: none;
  }

  .nav {
    left: 15px;
  }
}
</style>
</head>

<body>

<div class="bg"></div>

<!-- NAV -->
<div class="nav">
  <div class="logo"></div>
  <div class="brand">Valofy</div>
</div>

<div class="header">
  <div class="vinyl" id="vinyl"></div>
  <img src="cover.jpg" class="cover">

  <div class="info">
    <div class="label">EP</div>
    <div class="title">Tu Cumple EP ❤️</div>
    <div class="artist">José María Colombres</div>
  </div>
</div>

<div class="container">

  <div class="song">
    <div>En Un Solo Día (11/10/25) </div>
    <button onclick="playSong(0)" id="btn0">▶</button>
  </div>
  <div class="progress"><div class="progress-bar" id="bar0"></div></div>

  <div class="song">
    <div>Desde Cuando (Para Valo) </div>
    <button onclick="playSong(1)" id="btn1">▶</button>
  </div>
  <div class="progress"><div class="progress-bar" id="bar1"></div></div>

  <div class="song">
    <div>Outro (Feliz cumple!)</div>
    <button onclick="playSong(2)" id="btn2">▶</button>
  </div>
  <div class="progress"><div class="progress-bar" id="bar2"></div></div>

</div>

<div class="footer">
  Lanzado el 23 de abril de 2026
</div>

<audio id="audio0" src="song1.mp3"></audio>
<audio id="audio1" src="song2.mp3"></audio>
<audio id="audio2" src="song3.mp3"></audio>

<script>
let current = null;

function playSong(index) {
  let audios = [
    document.getElementById("audio0"),
    document.getElementById("audio1"),
    document.getElementById("audio2")
  ];

  let buttons = [
    document.getElementById("btn0"),
    document.getElementById("btn1"),
    document.getElementById("btn2")
  ];

  let vinyl = document.getElementById("vinyl");

  audios.forEach((a, i) => {
    if (i !== index) {
      a.pause();
      a.currentTime = 0;
      buttons[i].innerHTML = "▶";
      document.getElementById("bar" + i).style.width = "0%";
    }
  });

  let audio = audios[index];

  if (current === index && !audio.paused) {
    audio.pause();
    buttons[index].innerHTML = "▶";
    vinyl.classList.remove("playing");
    current = null;
    return;
  }

  audio.play();
  buttons[index].innerHTML = "⏸";
  vinyl.classList.add("playing");
  current = index;

  audio.ontimeupdate = () => {
    let percent = (audio.currentTime / audio.duration) * 100;
    document.getElementById("bar" + index).style.width = percent + "%";
  };

  audio.onended = () => {
    buttons[index].innerHTML = "▶";
    vinyl.classList.remove("playing");
    document.getElementById("bar" + index).style.width = "0%";
    current = null;
  };
}
</script>

</body>
</html>
